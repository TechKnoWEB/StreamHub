<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="50%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c084fc"/>
      <stop offset="100%" style="stop-color:#e879f9"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  
  <!-- Subtle pattern -->
  <circle cx="400" cy="100" r="200" fill="url(#glow)" opacity="0.1"/>
  <circle cx="100" cy="400" r="180" fill="url(#glow)" opacity="0.08"/>
  
  <!-- TV Screen -->
  <rect x="106" y="120" width="300" height="200" rx="20" fill="#1e1b4b" filter="url(#shadow)"/>
  <rect x="116" y="130" width="280" height="180" rx="12" fill="#0f0a2e"/>
  
  <!-- Play button -->
  <polygon points="230,185 230,265 295,225" fill="url(#glow)" opacity="0.9"/>
  
  <!-- Signal waves -->
  <path d="M320 170 Q350 200 320 230" stroke="url(#glow)" stroke-width="6" fill="none" opacity="0.6"/>
  <path d="M340 155 Q380 200 340 245" stroke="url(#glow)" stroke-width="5" fill="none" opacity="0.4"/>
  <path d="M360 140 Q410 200 360 260" stroke="url(#glow)" stroke-width="4" fill="none" opacity="0.25"/>
  
  <!-- TV Stand -->
  <rect x="200" y="320" width="112" height="12" rx="6" fill="#1e1b4b"/>
  <rect x="160" y="332" width="192" height="8" rx="4" fill="#1e1b4b" opacity="0.7"/>
  
  <!-- LIVE badge -->
  <rect x="130" y="280" width="60" height="28" rx="14" fill="#ef4444"/>
  <circle cx="148" cy="294" r="5" fill="#fff" opacity="0.9"/>
  <text x="168" y="300" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#fff">LIVE</text>
</svg>
